<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foppa Flyttar</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <link rel="stylesheet" href="styles.css">
    <script src="data/app-data.js"></script>
</head>
<body>
    <header class="site-brand" aria-label="Sidhuvud">
        <img src="images/foppa-flyttar.png" alt="Foppa Flyttar logotyp" class="site-logo">
    </header>

    <section class="map-section" aria-label="Karta över flyttar">
        <h1 class="map-title">Alla flytter</h1>
        <div class="map-play-controls">
            <button id="map-play-button" class="map-play-button" type="button" aria-label="Spela upp flyttrutt">
                ▶ Spela rutt
            </button>
        </div>
        <div id="moves-map" class="moves-map"></div>
        <div class="map-play-destination-row">
            <span id="map-play-destination" class="map-play-destination">
                <span class="map-play-year-badge">----</span>
                <span class="map-play-destination-address">-</span>
            </span>
        </div>
    </section>

    <button id="back-to-top-button" class="back-to-top-button" type="button" aria-label="Till toppen">
        ↑ Till Toppen
    </button>

    <div id="timeline-container" class="timeline-container"></div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script>
        const timelineContainer = document.getElementById("timeline-container");
        const mapPlayButton = document.getElementById("map-play-button");
        const mapPlayDestination = document.getElementById("map-play-destination");
        const movesMapElement = document.getElementById("moves-map");
        const backToTopButton = document.getElementById("back-to-top-button");

        const scrollToMapViewportPosition = () => {
            if (movesMapElement) {
                const mapRect = movesMapElement.getBoundingClientRect();
                const mapBottomAbsolute = window.scrollY + mapRect.bottom;
                const bottomMargin = 72;
                const targetScrollY = Math.max(0, mapBottomAbsolute - window.innerHeight + bottomMargin);

                window.scrollTo({
                    top: targetScrollY,
                    behavior: "smooth"
                });
                return;
            }

            window.scrollTo({
                top: 0,
                behavior: "smooth"
            });
        };

        const createTimelineItem = (move, options = {}) => {
            const side = move.side || "left";
            const hasImage = Boolean(move.image);
            const badgeMarkup = move.currentLocation
                ? "<span class=\"timeline-badge-current-location\">Nuvarande</span>"
                : "";
            const subtitleMarkup = move.subtitle
                ? "<p class=\"timeline-subtitle\">" + move.subtitle + "</p>"
                : "";
            const descriptionMarkup = move.details
                ? move.details.join("<br>")
                : (move.descriptionLines || []).join("<br>");
            const bodyMarkup = options.customBodyHtml
                ? options.customBodyHtml
                : "<p class=\"timeline-description\">" + descriptionMarkup + "</p>";
            const mapMarkup = options.includePredictedMap
                ? "<div id=\"predicted-move-map\" class=\"predicted-move-map\"></div>"
                : "";

            const timelineContentHtml =
                "<div class=\"timeline-content\">" +
                    "<div class=\"timeline-marker\"></div>" +
                    badgeMarkup +
                    "<h2 class=\"timeline-title\">" + move.title + "</h2>" +
                    subtitleMarkup +
                    bodyMarkup +
                    mapMarkup +
                    (hasImage
                        ? "<img src=\"" + move.image + "\" alt=\"" + move.alt + "\" class=\"timeline-image\">"
                        : "") +
                "</div>";

            const card = document.createElement("div");
            card.className = "timeline-item " + side;
            if (options.itemId) {
                card.id = options.itemId;
            }
            card.innerHTML =
                "<div class=\"timeline-content-wrapper\">" +
                    timelineContentHtml +
                "</div>";

            return card;
        };

        const createTimelinePair = (leftMove, rightMove, rightOptions = {}) => {
            const leftCard = createTimelineItem({ ...leftMove, side: "left" });
            const rightCard = createTimelineItem({ ...rightMove, side: "right" }, rightOptions);

            const pair = document.createElement("div");
            pair.className = "timeline-item timeline-item-pair";
            pair.innerHTML =
                "<div class=\"timeline-content-wrapper pair-left\">" +
                    leftCard.querySelector(".timeline-content-wrapper").innerHTML +
                "</div>" +
                "<div class=\"timeline-content-wrapper pair-right\">" +
                    rightCard.querySelector(".timeline-content-wrapper").innerHTML +
                "</div>";

            return pair;
        };

        const createDateWrapper = (text) => {
            const wrapper = document.createElement("div");
            wrapper.className = "timeline-date-wrapper";
            wrapper.innerHTML = "<div class=\"timeline-date\">" + text + "</div>";
            return wrapper;
        };

        const buildMovingFrequencyCard = () => {
            const years = appData.data.previousMoves
                .map((move) => move.year)
                .filter((year) => Number.isFinite(year));

            if (!years.length) {
                return {
                    move: {
                        title: "Flyttfrekvens",
                        side: "right"
                    },
                    bodyHtml: "<p class=\"timeline-description\">Ingen data tillgänglig.</p>"
                };
            }

            const minYear = Math.min(...years);
            const maxYear = Math.max(...years);
            const yearsInRange = [];
            for (let year = minYear; year <= maxYear; year += 1) {
                yearsInRange.push(year);
            }

            const countsByYear = years.reduce((acc, year) => {
                acc[year] = (acc[year] || 0) + 1;
                return acc;
            }, {});

            const maxCount = Math.max(...Object.values(countsByYear));
            const barsMarkup = yearsInRange.map((year) => {
                const count = countsByYear[year] || 0;
                const heightPercent = maxCount > 0 ? Math.max(8, (count / maxCount) * 100) : 8;
                return "<span class=\"frequency-bar\" style=\"height:" + heightPercent + "%\" title=\"" + year + ": " + count + " flytt\"></span>";
            }).join("");

            const totalMoves = years.length;
            const spanYears = (maxYear - minYear) + 1;
            const averagePerYear = (totalMoves / spanYears).toFixed(2);

            return {
                move: {
                    title: "Flyttfrekvens",
                    side: "right"
                },
                bodyHtml:
                    "<p class=\"timeline-description timeline-frequency-summary\">" +
                        totalMoves + " flyttar mellan " + minYear + " och " + maxYear +
                        " (snitt " + averagePerYear + " / år)" +
                    "</p>" +
                    "<div class=\"frequency-chart\">" +
                        "<div class=\"frequency-bars\">" + barsMarkup + "</div>" +
                        "<div class=\"frequency-scale\">" +
                            "<span>" + minYear + "</span><span>" + maxYear + "</span>" +
                        "</div>" +
                    "</div>"
            };
        };

        const hexToRgb = (hex) => {
            const value = hex.replace("#", "");
            return [
                parseInt(value.slice(0, 2), 16),
                parseInt(value.slice(2, 4), 16),
                parseInt(value.slice(4, 6), 16)
            ];
        };

        const getGradientColorAt = (progress) => {
            const stops = [
                { at: 0.00, color: "#ffe066" },
                { at: 0.12, color: "#ff8c00" },
                { at: 0.28, color: "#c64a00" },
                { at: 0.55, color: "#5b1a9b" },
                { at: 0.80, color: "#1a0b2e" },
                { at: 1.00, color: "#050505" }
            ];

            const clamped = Math.min(1, Math.max(0, progress));
            const endIndex = stops.findIndex((stop) => clamped <= stop.at);

            if (endIndex <= 0) {
                return stops[0].color;
            }

            const start = stops[endIndex - 1];
            const end = stops[endIndex];
            const localProgress = (clamped - start.at) / (end.at - start.at);
            const startRgb = hexToRgb(start.color);
            const endRgb = hexToRgb(end.color);

            const r = Math.round(startRgb[0] + (endRgb[0] - startRgb[0]) * localProgress);
            const g = Math.round(startRgb[1] + (endRgb[1] - startRgb[1]) * localProgress);
            const b = Math.round(startRgb[2] + (endRgb[2] - startRgb[2]) * localProgress);

            return "rgb(" + r + ", " + g + ", " + b + ")";
        };

        const applyTimelineMarkerColors = () => {
            const timelineLine = timelineContainer.querySelector(".timeline-line");
            if (!timelineLine) {
                return;
            }

            const lineRect = timelineLine.getBoundingClientRect();
            const markers = timelineContainer.querySelectorAll(".timeline-marker");

            markers.forEach((marker) => {
                const markerRect = marker.getBoundingClientRect();
                const markerCenterY = markerRect.top + (markerRect.height / 2);
                const progress = (markerCenterY - lineRect.top) / lineRect.height;
                const color = getGradientColorAt(progress);
                marker.style.borderColor = color;
            });
        };

        const renderTimeline = () => {
            timelineContainer.innerHTML = "";

            const line = document.createElement("div");
            line.className = "timeline-line";
            timelineContainer.appendChild(line);

            const predictedMove = {
                title: appData.data.predictedMove.title,
                subtitle: "",
                descriptionLines: ["Beräknad nästa flytt: " + appData.data.predictedMove.predicted_move_label_sv],
                side: appData.data.predictedMove.side
            };

            timelineContainer.appendChild(createTimelineItem(predictedMove, { includePredictedMap: true }));
            timelineContainer.appendChild(createDateWrapper("Idag"));
            const frequencyCard = buildMovingFrequencyCard();
            timelineContainer.appendChild(
                createTimelinePair(appData.data.pendingMove, frequencyCard.move, {
                    customBodyHtml: frequencyCard.bodyHtml
                })
            );

            let currentYear = null;
            appData.data.previousMoves.forEach((move, index) => {
                if (move.year !== currentYear) {
                    currentYear = move.year;
                    timelineContainer.appendChild(createDateWrapper(String(currentYear)));
                }

                const timelineItemId = "timeline-move-" + index;
                timelineContainer.appendChild(createTimelineItem(move, { itemId: timelineItemId }));
            });
        };

        const renderMainMap = () => {
            const moveEvents = appData.data.previousMoves;
            const playbackEvents = moveEvents.slice().reverse();

            const map = L.map("moves-map", {
                scrollWheelZoom: false
            });

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19,
                attribution: "&copy; OpenStreetMap contributors"
            }).addTo(map);

            const lineCoordinates = moveEvents.map((event) => [event.lat, event.lon]);
            const playbackCoordinates = playbackEvents.map((event) => [event.lat, event.lon]);
            const segmentCount = lineCoordinates.length - 1;
            const playbackZoom = 13;
            const segmentDurationMs = 1400;
            const stopPauseMs = 1000;
            const truckIcon = L.divIcon({
                className: "map-play-truck-marker",
                html: "🚚",
                iconSize: [52, 52],
                iconAnchor: [26, 26]
            });
            let isPlaying = false;
            let animationFrameId = null;
            let travelMarker = null;

            const setPlaybackDestination = (event) => {
                if (mapPlayDestination) {
                    if (!event) {
                        mapPlayDestination.innerHTML =
                            "<span class=\"map-play-year-badge\">----</span>" +
                            "<span class=\"map-play-destination-address\">-</span>";
                        return;
                    }

                    mapPlayDestination.innerHTML =
                        "<span class=\"map-play-year-badge\">" + event.year + "</span>" +
                        "<span class=\"map-play-destination-address\">" + event.title + "</span>";
                }
            };

            lineCoordinates.slice(0, -1).forEach((startPoint, index) => {
                const endPoint = lineCoordinates[index + 1];
                const progress = segmentCount > 1 ? index / (segmentCount - 1) : 0;

                L.polyline([startPoint, endPoint], {
                    color: getGradientColorAt(progress),
                    weight: 5,
                    opacity: 0.9
                }).addTo(map);
            });

            moveEvents.forEach((event, index) => {
                const marker = L.marker([event.lat, event.lon])
                    .addTo(map)
                    .bindPopup("<strong>" + (index + 1) + ". " + event.title + "</strong><br>" + event.subtitle);

                marker.on("click", () => {
                    const target = document.getElementById("timeline-move-" + index);
                    if (target) {
                        target.scrollIntoView({
                            behavior: "smooth",
                            block: "center"
                        });
                    }
                });
            });

            map.fitBounds(lineCoordinates, {
                padding: [40, 40]
            });

            const interpolatePoint = (startPoint, endPoint, progress) => {
                return [
                    startPoint[0] + (endPoint[0] - startPoint[0]) * progress,
                    startPoint[1] + (endPoint[1] - startPoint[1]) * progress
                ];
            };

            const easeInOutCubic = (t) => {
                if (t < 0.5) {
                    return 4 * t * t * t;
                }

                return 1 - Math.pow(-2 * t + 2, 3) / 2;
            };

            const playRoute = () => {
                if (!mapPlayButton || isPlaying || playbackCoordinates.length < 2) {
                    return;
                }

                scrollToMapViewportPosition();

                isPlaying = true;
                mapPlayButton.disabled = true;
                mapPlayButton.textContent = "Spelar…";
                setPlaybackDestination(playbackEvents[1]);

                if (!travelMarker) {
                    travelMarker = L.marker(playbackCoordinates[0], {
                        icon: truckIcon,
                        zIndexOffset: 1000
                    }).addTo(map);
                } else {
                    travelMarker.setLatLng(playbackCoordinates[0]);
                }

                let segmentIndex = 0;
                let segmentStartTs = null;
                let pauseUntilTs = null;
                let pendingDestinationEvent = null;

                map.setView(playbackCoordinates[0], playbackZoom, {
                    animate: true,
                    duration: 0.8
                });

                const animateStep = (timestamp) => {
                    if (pauseUntilTs !== null) {
                        if (timestamp < pauseUntilTs) {
                            animationFrameId = window.requestAnimationFrame(animateStep);
                            return;
                        }

                        pauseUntilTs = null;
                        segmentStartTs = timestamp;

                        if (pendingDestinationEvent) {
                            setPlaybackDestination(pendingDestinationEvent);
                            pendingDestinationEvent = null;
                        }
                    }

                    if (segmentStartTs === null) {
                        segmentStartTs = timestamp;
                    }

                    const startPoint = playbackCoordinates[segmentIndex];
                    const endPoint = playbackCoordinates[segmentIndex + 1];
                    const elapsed = timestamp - segmentStartTs;
                    const progress = Math.max(0, Math.min(elapsed / segmentDurationMs, 1));
                    const easedProgress = easeInOutCubic(progress);
                    const point = interpolatePoint(startPoint, endPoint, easedProgress);

                    travelMarker.setLatLng(point);
                    map.panTo(point, { animate: false });

                    if (progress >= 1) {
                        segmentIndex += 1;
                        segmentStartTs = timestamp;

                        if (segmentIndex >= playbackCoordinates.length - 1) {
                            isPlaying = false;
                            mapPlayButton.disabled = false;
                            mapPlayButton.textContent = "▶ Spela rutt";
                            setPlaybackDestination(playbackEvents[playbackEvents.length - 1]);
                            animationFrameId = null;
                            return;
                        }

                        pendingDestinationEvent = playbackEvents[segmentIndex + 1];
                        pauseUntilTs = timestamp + stopPauseMs;
                        segmentStartTs = null;
                    }

                    animationFrameId = window.requestAnimationFrame(animateStep);
                };

                if (animationFrameId) {
                    window.cancelAnimationFrame(animationFrameId);
                }
                animationFrameId = window.requestAnimationFrame(animateStep);
            };

            if (mapPlayButton) {
                mapPlayButton.addEventListener("click", playRoute);
            }
        };

        const renderPredictedMap = () => {
            const predictedLat = appData.data.predictedMove.predicted_latitude;
            const predictedLon = appData.data.predictedMove.predicted_longitude;

            const predictedMap = L.map("predicted-move-map", {
                scrollWheelZoom: false,
                dragging: false,
                touchZoom: false,
                doubleClickZoom: false,
                boxZoom: false,
                keyboard: false,
                zoomControl: false,
                attributionControl: false
            });

            L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                maxZoom: 19
            }).addTo(predictedMap);

            L.marker([predictedLat, predictedLon])
                .addTo(predictedMap)
                .bindPopup(
                    "<strong>Beräknad nästa flytt</strong><br>" +
                    appData.data.predictedMove.predicted_move_label_sv
                );

            predictedMap.setView([predictedLat, predictedLon], 13);

            setTimeout(() => {
                predictedMap.invalidateSize();
                predictedMap.setView([predictedLat, predictedLon], 13);
            }, 500);
        };

        renderTimeline();
        applyTimelineMarkerColors();
        renderMainMap();
        renderPredictedMap();

        window.addEventListener("resize", applyTimelineMarkerColors);
        window.addEventListener("load", applyTimelineMarkerColors);

        const updateBackToTopVisibility = () => {
            if (!backToTopButton) {
                return;
            }

            backToTopButton.classList.toggle("visible", window.scrollY > 300);
        };

        if (backToTopButton) {
            backToTopButton.addEventListener("click", () => {
                scrollToMapViewportPosition();
            });
        }

        window.addEventListener("scroll", updateBackToTopVisibility);
        updateBackToTopVisibility();
    </script>

</body>
</html>
