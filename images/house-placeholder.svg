<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
    <title id="title">House image placeholder</title>
    <desc id="desc">Placeholder illustration for a house photo.</desc>
    <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#eaf4ff"/>
            <stop offset="100%" stop-color="#dbe9f8"/>
        </linearGradient>
        <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d6ebd3"/>
            <stop offset="100%" stop-color="#bfdcb9"/>
        </linearGradient>
    </defs>

    <rect width="1200" height="520" fill="url(#sky)"/>
    <rect y="520" width="1200" height="280" fill="url(#grass)"/>

    <rect x="340" y="320" width="520" height="300" rx="10" fill="#f7f3ef"/>
    <polygon points="300,340 600,170 900,340" fill="#c97d58"/>
    <rect x="350" y="330" width="500" height="20" fill="#b9704f"/>

    <rect x="430" y="390" width="110" height="100" rx="8" fill="#d8e7f5"/>
    <rect x="660" y="390" width="110" height="100" rx="8" fill="#d8e7f5"/>
    <rect x="560" y="450" width="80" height="170" rx="8" fill="#9a6a4b"/>

    <rect x="70" y="70" width="420" height="110" rx="16" fill="#ffffff" opacity="0.92"/>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#35506a">
        House photo placeholder
    </text>
</svg>
